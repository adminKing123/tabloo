<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="20" fill="#4F46E5"/>
  <g fill="white">
    <!-- Table grid icon -->
    <rect x="20" y="25" width="60" height="50" rx="4" fill="none" stroke="white" stroke-width="3"/>
    <!-- Horizontal lines -->
    <line x1="20" y1="40" x2="80" y2="40" stroke="white" stroke-width="3"/>
    <line x1="20" y1="55" x2="80" y2="55" stroke="white" stroke-width="3"/>
    <!-- Vertical line -->
    <line x1="45" y1="25" x2="45" y2="75" stroke="white" stroke-width="3"/>
    <!-- Decorative dots representing data -->
    <circle cx="32.5" cy="47.5" r="2.5" fill="white"/>
    <circle cx="62.5" cy="47.5" r="2.5" fill="white"/>
    <circle cx="32.5" cy="65" r="2.5" fill="white"/>
    <circle cx="62.5" cy="65" r="2.5" fill="white"/>
  </g>
</svg>
